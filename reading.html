<body>

<div class="app">

    <aside class="sidebar">

        <div class="logo">
            📚 N1 Master
        </div>

        <nav>
            <a href="index.html">🏠 ホーム</a>
            <a href="quiz.html?mode=vocabulary">📚 語彙</a>
            <a href="quiz.html?mode=kanji">🈶 漢字</a>

        </nav>

    </aside>

    <main class="main-content">

        <header class="topbar">

            <div class="user-box">

            </div>
        </header>

        <section class="quiz-card">

            <div class="quiz-menu">

    <button onclick="startReading('reading-short')">
        📄<br>
        <span>短文読解</span>
    </button>

    <button onclick="startReading('reading-medium')">
        📘<br>
        <span>中文読解</span>
    </button>

    <button onclick="startReading('reading-long')">
        📚<br>
        <span>長文読解</span>
    </button>

    <button onclick="startReading('reading-compare')">
        ⚖️<br>
        <span>比較読解</span>
    </button>

    <button onclick="startReading('reading-search')">
        🔍<br>
        <span>情報検索</span>
    </button>

    <button onclick="startReading('reading-random')">
        🎲<br>
        <span>ランダム読解</span>
    </button>

</div>

        </section>

    </main>

</div>

<script src="JS/theme.js"></script>
